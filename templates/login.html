{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-gray-600 text-2xl font-bold mb-6 text-center">Login</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Email"
                   class="w-full mb-4 p-2 border rounded" required>

            <input type="password" name="password" placeholder="Password"
                   class="text-gray-600 w-full mb-4 p-2 border rounded" required>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded">
                Login
            </button>
        </form>
    </div>
</div>

{% endblock %}
